name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# upload-pages-artifact běží v jobu build → musí mít pages:write už na úrovni workflow
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      # Vite vkládá VITE_* do bundlu při buildu – bez toho je Supabase v produkci „vypnuté“.
      # base „/“ = vlastní doména / subdomain u kořene. Jen github.io/REPO bez domény: npm run build:github-project-page
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # GitHub Pages: deep link /elobvod/ukol/… jinak vrací 404 bez této kopie
      - name: SPA fallback (404 → index)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
